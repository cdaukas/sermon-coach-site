<svg viewBox="0 0 1120 300" xmlns="http://www.w3.org/2000/svg" font-family="'Iowan Old Style','Charter',Georgia,serif" role="img" aria-label="The preaching rhythm: Pray and study, write the sermon, strengthen the manuscript with Sermon Coach, preach with Spirit-empowered confidence, and keep growing from the transcript with Sermon Coach.">
  <defs>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a2332" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="fire" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e3c486"/>
      <stop offset="0.5" stop-color="#c9a55c"/>
      <stop offset="1" stop-color="#a67c2e"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1120" height="300" fill="#faf8f3"/>

  <!-- ============ REFINER'S FIRE BEHIND THE TWO SERMON COACH STEPS ============ -->
  <g>
    <!-- soft glow -->
    <g transform="translate(560,117) scale(7) translate(-12,-12)"><path d="M12.963 2.286a.75.75 0 0 0-1.071-.136 9.742 9.742 0 0 0-3.539 6.177 7.547 7.547 0 0 1-1.705-1.715.75.75 0 0 0-1.152-.082A9 9 0 1 0 15.68 4.534a7.46 7.46 0 0 1-2.717-2.248ZM15.75 14.25a3.75 3.75 0 1 1-7.313-1.172c.628.465 1.35.81 2.133 1.005A5.99 5.99 0 0 1 12.49 10.5a3.75 3.75 0 0 1 3.26 3.75Z" fill="#c9a55c" opacity="0.28"/></g>
    <g transform="translate(1050,117) scale(7) translate(-12,-12)"><path d="M12.963 2.286a.75.75 0 0 0-1.071-.136 9.742 9.742 0 0 0-3.539 6.177 7.547 7.547 0 0 1-1.705-1.715.75.75 0 0 0-1.152-.082A9 9 0 1 0 15.68 4.534a7.46 7.46 0 0 1-2.717-2.248ZM15.75 14.25a3.75 3.75 0 1 1-7.313-1.172c.628.465 1.35.81 2.133 1.005A5.99 5.99 0 0 1 12.49 10.5a3.75 3.75 0 0 1 3.26 3.75Z" fill="#c9a55c" opacity="0.28"/></g>
    <!-- main flame -->
    <g transform="translate(560,118) scale(6.5) translate(-12,-12)"><path d="M12.963 2.286a.75.75 0 0 0-1.071-.136 9.742 9.742 0 0 0-3.539 6.177 7.547 7.547 0 0 1-1.705-1.715.75.75 0 0 0-1.152-.082A9 9 0 1 0 15.68 4.534a7.46 7.46 0 0 1-2.717-2.248ZM15.75 14.25a3.75 3.75 0 1 1-7.313-1.172c.628.465 1.35.81 2.133 1.005A5.99 5.99 0 0 1 12.49 10.5a3.75 3.75 0 0 1 3.26 3.75Z" fill="url(#fire)"/></g>
    <g transform="translate(1050,118) scale(6.5) translate(-12,-12)"><path d="M12.963 2.286a.75.75 0 0 0-1.071-.136 9.742 9.742 0 0 0-3.539 6.177 7.547 7.547 0 0 1-1.705-1.715.75.75 0 0 0-1.152-.082A9 9 0 1 0 15.68 4.534a7.46 7.46 0 0 1-2.717-2.248ZM15.75 14.25a3.75 3.75 0 1 1-7.313-1.172c.628.465 1.35.81 2.133 1.005A5.99 5.99 0 0 1 12.49 10.5a3.75 3.75 0 0 1 3.26 3.75Z" fill="url(#fire)"/></g>
  </g>

  <!-- eyebrow -->
  <text x="560" y="30" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="700" letter-spacing="3.2" fill="#a67c2e">THE PREACHING RHYTHM</text>

  <!-- ============ CONNECTORS ============ -->
  <g stroke="#c9a55c" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M128,150 H251 M251,150 l-7,-6 M251,150 l-7,6"/>
    <path d="M373,150 H496 M496,150 l-7,-6 M496,150 l-7,6"/>
    <path d="M618,150 H741 M741,150 l-7,-6 M741,150 l-7,6"/>
    <path d="M863,150 H986 M986,150 l-7,-6 M986,150 l-7,6"/>
  </g>

  <!-- ============ STEP 1 · PRAY & STUDY ============ -->
  <g transform="translate(70,150)">
    <circle r="46" fill="#ffffff" stroke="#d4cfc1" stroke-width="1.5" filter="url(#soft)"/>
    <g stroke="#2a3447" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0,-13 V13" stroke-width="2.4"/>
      <path d="M0,-13 C-6,-16 -16,-16 -22,-14 V11 C-16,9 -6,9 0,12" stroke-width="2.4"/>
      <path d="M0,-13 C6,-16 16,-16 22,-14 V11 C16,9 6,9 0,12" stroke-width="2.4"/>
      <path d="M-17,-6 H-6 M-17,0 H-6 M6,-6 H17 M6,0 H17" stroke-width="1.5"/>
    </g>
  </g>

  <!-- ============ STEP 2 · WRITE THE SERMON ============ -->
  <g transform="translate(315,150)">
    <circle r="46" fill="#ffffff" stroke="#d4cfc1" stroke-width="1.5" filter="url(#soft)"/>
    <g stroke="#2a3447" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16,-16 C8,-10 -2,-1 -10,9" stroke-width="2.4"/>
      <path d="M16,-16 C19,-8 14,-1 5,4" stroke-width="2.4"/>
      <path d="M11,-11 l-5,3 M8,-7 l-5,3 M4,-2 l-5,3" stroke-width="1.4"/>
      <path d="M-10,9 l-3,6 l6,-2" stroke-width="2.2"/>
      <path d="M-18,16 H7" stroke-width="1.8"/>
    </g>
  </g>

  <!-- ============ STEP 3 · SERMON COACH — STRENGTHEN (MANUSCRIPT) ============ -->
  <g transform="translate(560,150)">
    <circle r="46" fill="#a67c2e" stroke="#8a6624" stroke-width="1.5" filter="url(#soft)"/>
    <g stroke="#faf6ed" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-13,-16 H6 L14,-8 V16 H-13 Z" stroke-width="2.4"/>
      <path d="M6,-16 V-8 H14" stroke-width="2.4"/>
      <path d="M-8,-6 H7 M-8,-1 H3" stroke-width="1.5"/>
      <path d="M-1,13 V4 M-5,8 L-1,4 L3,8" stroke-width="2.2"/>
    </g>
  </g>

  <!-- ============ STEP 4 · PREACH ============ -->
  <g transform="translate(805,150)">
    <circle r="46" fill="#ffffff" stroke="#d4cfc1" stroke-width="1.5" filter="url(#soft)"/>
    <g stroke="#2a3447" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-15,-2 L9,-9 L17,-4 L-7,3 Z" stroke-width="2.4"/>
      <path d="M-2,-4 L2,-6 L7,-5" stroke-width="1.6"/>
      <path d="M1,1 V14 M-9,16 H11" stroke-width="2.4"/>
      <path d="M14,-12 q5,2 5,7 M19,-15 q7,3 7,11" stroke-width="1.5"/>
    </g>
  </g>

  <!-- ============ STEP 5 · SERMON COACH — KEEP GROWING (TRANSCRIPT) ============ -->
  <g transform="translate(1050,150)">
    <circle r="46" fill="#a67c2e" stroke="#8a6624" stroke-width="1.5" filter="url(#soft)"/>
    <g stroke="#faf6ed" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-18,4 V-4 M-12,7 V-7 M-6,5 V-5" stroke-width="2.6"/>
      <path d="M-1,8 L7,0 L13,-7" stroke-width="2.4"/>
      <path d="M13,-7 V-2 M13,-7 H8" stroke-width="2.4"/>
    </g>
  </g>

  <!-- ============ NUMBER BADGES (drawn last so they sit on the rim) ============ -->
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#ffffff">
    <circle cx="70"   cy="110" r="14" fill="#a67c2e" stroke="#faf8f3" stroke-width="1.5"/><text x="70"   y="115">1</text>
    <circle cx="315"  cy="110" r="14" fill="#a67c2e" stroke="#faf8f3" stroke-width="1.5"/><text x="315"  y="115">2</text>
    <circle cx="560"  cy="110" r="14" fill="#1a2332" stroke="#faf8f3" stroke-width="1.5"/><text x="560"  y="115">3</text>
    <circle cx="805"  cy="110" r="14" fill="#a67c2e" stroke="#faf8f3" stroke-width="1.5"/><text x="805"  y="115">4</text>
    <circle cx="1050" cy="110" r="14" fill="#1a2332" stroke="#faf8f3" stroke-width="1.5"/><text x="1050" y="115">5</text>
  </g>

  <!-- ============ LABELS ============ -->
  <g text-anchor="middle" fill="#1a2332" font-size="16" font-weight="600">
    <text x="70"  y="232">Pray &amp; Study</text>

    <text x="315" y="232">Write the Sermon</text>

    <text x="560" y="212" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9.5" font-weight="700" letter-spacing="1.6" fill="#a67c2e">SERMON COACH</text>
    <text x="560" y="232">Strengthen the</text>
    <text x="560" y="250">manuscript</text>

    <text x="805" y="232">Preach with</text>
    <text x="805" y="250">Spirit-empowered</text>
    <text x="805" y="268">confidence</text>

    <text x="1050" y="212" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9.5" font-weight="700" letter-spacing="1.6" fill="#a67c2e">SERMON COACH</text>
    <text x="1050" y="232">Keep growing</text>
    <text x="1050" y="250">from your transcript</text>
  </g>
</svg>
